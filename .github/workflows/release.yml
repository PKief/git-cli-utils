name: Release + Publish

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Required for fetching tags and generating release notes
          fetch-depth: 0

      - name: 🛠 Setup Platform
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2
        with:
          bun-version-file: ".bun-version"

      - name: 📦 Install dependencies
        run: |
          bun install --frozen-lockfile
          bun add -g npm

      - name: 🔧 Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git config --global push.followTags true

      - name: 📜 Generate changelog and bump version
        run: |
          git pull --rebase origin main
          # Bump version and generate changelog without committing
          bunx changelogen --hideAuthorEmail --bump --output CHANGELOG.md

      - name: 🔄 Sync package-lock.json
        run: |
          # Update package-lock.json to match new version in package.json
          npm install --package-lock-only

      - name: 📝 Get new version
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"

      - name: 📤 Commit, tag and push release
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): v${VERSION}"
          git tag -am "v${VERSION}" "v${VERSION}"
          git push --follow-tags

      - name: 🐙 Create GitHub release
        run: |
          bunx changelogen github release --token ${{ secrets.GITHUB_TOKEN }}

      - name: ⚒️ Build
        run: bun run build

      - name: 🌐 Publish to NPM Registry
        run: npm publish --provenance --access public
